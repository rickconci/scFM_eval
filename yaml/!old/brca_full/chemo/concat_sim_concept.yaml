# =============================================================================
# Chemo Classification (treatment_naive vs neoadjuvant_chemo) using pre-computed embeddings
# =============================================================================
# REQUIRES: First run extract_embeddings.yaml to generate embeddings for all cells
# =============================================================================

run_id:
dataset:
    module: data.data_loader
    class: H5ADLoader
    path: DATASETS/SCFM_datasets/Bassez_2021_processed/bassez_combined_preprocessed_prepared.h5ad
    load_raw: False
    label_key: cohort
    batch_key: donor_id
    filter: 
      - column: timepoint
        values:
          - Pre
      - column: cell_types
        values:
          - Cancer_cell
    layer_name: X
    train_test_split: data_splits/brca_full/brca_chemo/train_test_split_oversampled.json
    cv_splits: data_splits/brca_full/brca_chemo/cv_splits_oversampled.json

qc:
    skip: True

preprocessing:
    skip: True  # Not needed when using pre-computed embeddings

embedding:
  # Load from central embeddings file (extracted once for all cells)
  embeddings_file: brca_full/extract_embeddings_embeddings/data.h5ad
  embedding_key: X_concat_scConcept_scimilarity
  viz: True
  eval: True

  # Methods listed for reference (embeddings already extracted)
  methods:
    - name: scConcept
      module: features.scconcept_extractor
      class: scConceptExtractor
      params:
        model_name: Corpus-30M
        cache_dir: /lotterlab/datasets/VCC/MODEL_CHECKPOINTS/SC_FM_repo_checkpoints/scConcept
        batch_size: 32
        gene_id_column: gene_ids
        repo_id: theislab/scConcept
        use_gpu: True

    - name: scimilarity
      module: features.scimilarity_extractor
      class: SCimilarityExtractor
      params:
        model_path: /lotterlab/datasets/VCC/MODEL_CHECKPOINTS/SC_FM_repo_checkpoints/SCSimilarity/model_v1.1
        batch_size: 32
        use_gpu: True

# Evaluations section: configure which evaluations to run
evaluations:
    # Classification evaluation (treatment cohort classification)
    - type: classification
      skip: False
      params:
          module: models.classify
          class: ClassifierPipeline
          model: random_forest
          n_estimators: 100
          max_depth: 5
          train_funcs: 
              - avg
              - mil
              - vote
          cv: True
          cls_level: patient
          label_map:
              treatment_naive: 0
              neoadjuvant_chemo: 1
          viz: True
          eval: True

