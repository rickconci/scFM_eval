run_id: 
dataset:
    module: data.data_loader
    class: H5ADLoader
    path: mnt/DATA/luad_brca/luad/luad_analysis2.h5ad #path is relative to DATA_PATH in setup_path.py
    load_raw: True
    label_key: group_id
    batch_key: sample_id
    layer_name: X  #if data exist in another layer (e.g. adta.layers['counts']). The data will be copied to adata.X
    train_test_split: data_splits/luad/luad2/train_test_split.json #path is relative to BASE_PATH in setup_path.py
    cv_splits: data_splits/luad/luad2/cv_splits.json #path is relative to BASE_PATH in setup_path.py

qc:
    # skip: True
    min_genes: 10
    min_cells: 10

preprocessing:
    skip: True
    normalize: True
    target_sum: 10000
    apply_log1p: True

hvg:
    skip: True
    batch_key: batch
    n_top_genes: 4096
    flavor: seurat # expect logarithmized data
    
embedding:
    method: scConcept
    module: extractors.scconcept_extractor
    class: scConceptExtractor
    viz: True
    eval: True
    params: 
        model_name: Corpus-30M
        cache_dir: ${VCC_CHECKPOINTS_BASE}/scConcept
        batch_size: 32
        gene_id_column: gene_ids
        repo_id: theislab/scConcept

# Evaluations section: configure which evaluations to run
evaluations:
    # Classification evaluation (treatment classification)
    - type: classification
      skip: False
      params:
          module: models.classify
          class: ClassifierPipeline
          model: random_forest
          n_estimators: 100
          max_depth: 5
          train_funcs: 
              - avg
              - mil
              - vote
          cv: True
          cls_level: patient
          label_map:
              treatment_naive: 0
              TKI: 1
          viz: True
          eval: True
