run_id: null
dataset:
  module: data.data_loader
  class: H5ADLoader
  path: DATASETS/SCFM_datasets/EvalDatasets/cell_identity_batch/tabula_sapiens.h5ad
  load_raw: false
  label_key: cell_type
  batch_key: Batch_ID
  layer_name: X
  train_test_split: null
  cv_splits: null
  dataset_name: tabula_sapiens
  task_name: cell_type_classification
qc:
  min_genes: 10
  min_cells: 10
preprocessing:
  skip: false
  normalize: true
  target_sum: 10000
  apply_log1p: true
hvg:
  skip: false
  batch_key: Batch_ID
  n_top_genes: 4096
  flavor: seurat
embedding:
  method: scConcept
  module: features.scconcept_extractor
  class: scConceptExtractor
  viz: true
  eval: true
  params:
    model_name: Corpus-30M
    cache_dir: /lotterlab/datasets/VCC/MODEL_CHECKPOINTS/SC_FM_repo_checkpoints/scConcept
    batch_size: 32
    gene_id_column: gene_ids
    repo_id: theislab/scConcept
evaluations:
- type: classification
  skip: false
  params:
    module: models.classify
    class: ClassifierPipeline
    model: random_forest
    n_estimators: 100
    max_depth: 5
    train_funcs:
    - avg
    - mil
    - vote
    cv: true
    cls_level: cell
    label_map:
      astrocyte: 0
      endothelial cell: 1
      ependymal cell: 2
      erythrocyte: 3
      fibroblast: 4
      hypendymal cell: 5
      microglial cell: 6
      mural cell: 7
      neuron: 8
      oligodendrocyte: 9
      oligodendrocyte precursor cell: 10
      pituitary gland cell: 11
      tanycyte: 12
    viz: true
    eval: true
