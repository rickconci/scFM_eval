run_id: null
dataset:
  module: data.data_loader
  class: H5ADLoader
  path: DATASETS/SCFM_datasets/EvalDatasets/cell_identity_batch/dkd.h5ad
  load_raw: false
  label_key: cell_type
  batch_key: library_uuid
  layer_name: X
  train_test_split: null
  cv_splits: null
  dataset_name: dkd
  task_name: cell_type_classification
qc:
  min_genes: 10
  min_cells: 10
preprocessing:
  skip: false
  normalize: true
  target_sum: 10000
  apply_log1p: true
hvg:
  skip: true
  batch_key: library_uuid
  n_top_genes: 4096
  flavor: seurat
embedding:
  load_cached: false
  method: scimilarity
  module: features.scimilarity_extractor
  class: SCimilarityExtractor
  viz: true
  eval: true
  params:
    model_path: /lotterlab/datasets/VCC/MODEL_CHECKPOINTS/SC_FM_repo_checkpoints/SCSimilarity/model_v1.1
    use_gpu: true
evaluations:
- type: classification
  skip: false
  params:
    module: models.classify
    class: ClassifierPipeline
    model: random_forest
    n_estimators: 100
    max_depth: 5
    train_funcs:
    - avg
    - mil
    - vote
    cv: true
    cls_level: cell
    label_map:
      endothelial cell: 0
      epithelial cell of proximal tubule: 1
      fibroblast: 2
      kidney distal convoluted tubule epithelial cell: 3
      kidney loop of Henle thick ascending limb epithelial cell: 4
      kidney loop of Henle thin ascending limb epithelial cell: 5
      leukocyte: 6
      mesangial cell: 7
      parietal epithelial cell: 8
      podocyte: 9
      renal alpha-intercalated cell: 10
      renal beta-intercalated cell: 11
      renal principal cell: 12
    viz: true
    eval: true
