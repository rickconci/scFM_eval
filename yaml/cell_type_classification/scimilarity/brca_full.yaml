run_id: null
dataset:
  module: data.data_loader
  class: H5ADLoader
  path: DATASETS/SCFM_datasets/Bassez_2021_processed/bassez_combined_preprocessed_prepared.h5ad
  load_raw: false
  label_key: cell_types
  batch_key: donor_id
  filter:
  - column: timepoint
    values:
    - Pre
  layer_name: X
  train_test_split: data_splits/brca_full/brca_cell_type/train_test_split.json
  cv_splits: data_splits/brca_full/brca_cell_type/cv_splits.json
  dataset_name: brca_full
  task_name: cell_type_classification
qc:
  min_genes: 10
  min_cells: 10
preprocessing:
  skip: false
  normalize: true
  target_sum: 10000
  apply_log1p: true
hvg:
  skip: false
  batch_key: batch
  n_top_genes: 4096
  flavor: seurat
embedding:
  load_cached: false
  method: scimilarity
  module: features.scimilarity_extractor
  class: SCimilarityExtractor
  viz: true
  eval: true
  params:
    model_path: /lotterlab/datasets/VCC/MODEL_CHECKPOINTS/SC_FM_repo_checkpoints/SCSimilarity/model_v1.1
    use_gpu: true
evaluations:
- type: classification
  skip: false
  params:
    module: models.classify
    class: ClassifierPipeline
    model: randomforest
    n_estimators: 100
    max_depth: 5
    train_funcs:
    - avg
    - mil
    - vote
    cv: true
    cls_level: cell
    label_map:
      T_cell: 0
      Cancer_cell: 1
      Fibroblast: 2
      Myeloid_cell: 3
      B_cell: 4
      Endothelial_cell: 5
      Mast_cell: 6
      pDC: 7
    viz: true
    eval: true
