run_id: null
dataset:
  module: data.data_loader
  class: H5ADLoader
  path: DATASETS/SCFM_datasets/Bassez_2021_processed/bassez_combined_preprocessed_prepared.h5ad
  load_raw: false
  label_key: Cancer_type
  batch_key: donor_id
  filter:
  - column: Cancer_type
    values:
    - ER+
    - TNBC
  - column: timepoint
    values:
    - Pre
  layer_name: X
  train_test_split: data_splits/brca_full/brca_subtype/train_test_split.json
  cv_splits: data_splits/brca_full/brca_subtype/cv_splits.json
  dataset_name: bassez_combined_preprocessed_prepared
  task_name: cancer_subtype_classification
qc:
  min_genes: 10
  min_cells: 10
preprocessing:
  skip: false
  normalize: true
  target_sum: 10000
  apply_log1p: true
hvg:
  skip: false
  n_top_genes: 4096
  flavor: seurat
  batch_key: donor_id
embedding:
  method: stack_small_data
  module: extractors.stack.extract
  class: STACKExtractor
  viz: true
  eval: true
  params:
    checkpoint_path: ${VCC_CHECKPOINTS_BASE}/STACK/ablation/E0_baseline/last.ckpt
    genelist_path: ${VCC_CHECKPOINTS_BASE}/STACK/basecount_1000per_15000max.pkl
    batch_size: 32
    device: auto
    gene_name_col: null
evaluations:
- type: classification
  skip: false
  params:
    module: models.classify
    class: ClassifierPipeline
    model: randomforest
    n_estimators: 100
    max_depth: 5
    train_funcs:
    - avg
    - mil
    - vote
    cv: true
    cls_level: patient
    label_map:
      ER+: 0
      TNBC: 1
    viz: true
    eval: true
