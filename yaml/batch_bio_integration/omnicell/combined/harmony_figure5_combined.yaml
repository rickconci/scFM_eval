run_id: null
dataset:
  dataset_name: harmony_figure5
  task_name: batch_bio_integration
  module: data.data_loader
  class: H5ADLoader
  path: DATASETS/SCFM_datasets/EvalDatasets/cell_batch_real/harmony_figure5/harmony_figure5_combined.h5ad
  load_raw: false
  label_key: cell_type
  batch_key: donor_dataset_combined
  layer_name: X
  train_test_split: null
  cv_splits: null
qc:
  min_genes: 10
  min_cells: 10
preprocessing:
  skip: false
  normalize: true
  target_sum: 10000
  apply_log1p: true
hvg:
  skip: false
  batch_key: donor_dataset_combined
  n_top_genes: 4096
  flavor: seurat
embedding:
  method: omnicell
  module: extractors.omnicell.extract
  class: OmnicellExtractor
  viz: true
  eval: true
  params:
    checkpoint_path: ${VCC_OMNICELL_CHECKPOINTS_BASE}/VCC_checkpoints/omnicell_checkpoint_epoch27.pt
    base_dir: ${OMNICELL_BASE_DIR}
    config: obs
    batch_size: 4096
    gene_types: feature_name
    load_avg: false
evaluations:
- type: batch_effects
  skip: false
  params:
    batch_key: donor_dataset_combined
    label_key: cell_type
    metric: euclidean
    auto_subsample: true
    n_neighbors: 90
    run_baselines: true
    baseline_methods:
    - embed_cell_types
    - embed_cell_types_jittered
- type: biological_signal
  skip: false
  params:
    label_key: cell_type
    metric: euclidean
    auto_subsample: true
    leiden_resolution: 0.3
    n_neighbors: 15
- type: annotation
  skip: false
  params:
    label_key: cell_type
    k: 15
    metric: euclidean
    method: sklearn_knn
    split_strategies:
    - round_robin
    min_cells_per_type: 2
