run_id: null
dataset:
  task_name: batch_bio_integration
  module: data.data_loader
  class: H5ADLoader
  path: DATASETS/SCFM_datasets/EvalDatasets/cancer_benchmarking/curated_cancer_atlas/Chan2021_Lung.h5ad
  load_raw: false
  label_key: cell_type
  batch_key: sample
  layer_name: X
  train_test_split: null
  cv_splits: null
  dataset_name: chan2021_lung_tumor_pre
  filter:
  - column: sample_type
    values:
    - Tumor
  - column: treatment_cell
    values:
    - Naive
qc:
  min_genes: 10
  min_cells: 10
preprocessing:
  skip: false
  normalize: true
  target_sum: 10000
  apply_log1p: true
hvg:
  skip: false
  batch_key: sample
  n_top_genes: 4096
  flavor: seurat
embedding:
  method: geneformer
  module: extractors.geneformer.extract
  class: GeneformerExtractor
  viz: true
  eval: true
  params:
    model_dir: ${VCC_CHECKPOINTS_BASE}/Geneformer-V2-104M
    model_name: Geneformer-V2-104M
    batch_size: 32
    max_input_size: 2048
    device: auto
    gene_name_col: null
evaluations:
- type: batch_effects
  skip: false
  params:
    batch_key: sample
    label_key: cell_type
    metric: euclidean
    auto_subsample: true
    n_neighbors: 90
    run_baselines: true
    baseline_methods:
    - embed_cell_types
    - embed_cell_types_jittered
- type: biological_signal
  skip: false
  params:
    label_key: cell_type
    metric: euclidean
    auto_subsample: true
    leiden_resolution: 0.3
    n_neighbors: 15
- type: annotation
  skip: false
  params:
    label_key: cell_type
    k: 15
    metric: euclidean
    method: sklearn_knn
    split_strategies:
    - round_robin
    min_cells_per_type: 2
