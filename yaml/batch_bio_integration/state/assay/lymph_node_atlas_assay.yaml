run_id: null
dataset:
  dataset_name: lymph_node_atlas
  task_name: batch_bio_integration
  module: data.data_loader
  class: H5ADLoader
  path: lymph_node_atlas.h5ad
  load_raw: false
  label_key: cell_type
  batch_key: batch
  layer_name: X
  train_test_split: null
  cv_splits: null
qc:
  min_genes: 10
  min_cells: 10
preprocessing:
  skip: false
  normalize: true
  target_sum: 10000
  apply_log1p: true
hvg:
  skip: false
  batch_key: batch
  n_top_genes: 4096
  flavor: seurat
embedding:
  method: state
  module: extractors.state.extract
  class: STATEExtractor
  viz: true
  eval: true
  params:
    model_dir: ${VCC_CHECKPOINTS_BASE}/STATE/SE-600M
    batch_size: 32
evaluations:
- type: batch_effects
  skip: false
  params:
    batch_key: batch
    label_key: cell_type
    metric: euclidean
    auto_subsample: true
    n_neighbors: 90
    run_baselines: true
    baseline_methods:
    - embed_cell_types
    - embed_cell_types_jittered
- type: biological_signal
  skip: false
  params:
    label_key: cell_type
    metric: euclidean
    auto_subsample: true
    leiden_resolution: 0.3
    n_neighbors: 15
- type: annotation
  skip: false
  params:
    label_key: cell_type
    k: 15
    metric: euclidean
    method: sklearn_knn
    split_strategies:
    - round_robin
    min_cells_per_type: 2
