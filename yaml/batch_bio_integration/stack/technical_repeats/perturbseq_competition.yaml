run_id: null
dataset:
  dataset_name: perturbseq_competition
  task_name: batch_bio_integration
  module: data.data_loader
  class: H5ADLoader
  path: DATASETS/SC_PerturbSeq_datasets/competition_train.h5
  load_raw: false
  label_key: target_gene
  batch_key: batch
  layer_name: X
  filter:
  - column: target_gene
    values:
    - non-targeting
  train_test_split: null
  cv_splits: null
qc:
  min_genes: 10
  min_cells: 10
preprocessing:
  skip: false
  normalize: true
  target_sum: 10000
  apply_log1p: true
hvg:
  skip: false
  batch_key: batch
  n_top_genes: 4096
  flavor: seurat
embedding:
  method: stack
  module: extractors.stack.extract
  class: STACKExtractor
  viz: true
  eval: true
  params:
    checkpoint_path: ${VCC_CHECKPOINTS_BASE}/STACK/bc_large_aligned.ckpt
    genelist_path: ${VCC_CHECKPOINTS_BASE}/STACK/basecount_1000per_15000max.pkl
    batch_size: 32
    device: auto
    gene_name_col: null
evaluations:
- type: batch_effects
  skip: false
  params:
    batch_key: batch
    label_key: target_gene
    metric: euclidean
    auto_subsample: true
    n_neighbors: 90
    run_baselines: true
    baseline_methods:
    - embed_cell_types
    - embed_cell_types_jittered
