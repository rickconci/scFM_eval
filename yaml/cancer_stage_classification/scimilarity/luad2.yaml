run_id: null
dataset:
  module: data.data_loader
  class: H5ADLoader
  path: mnt/DATA/luad_brca/luad/luad_analysis2.h5ad
  load_raw: true
  label_key: group_id
  batch_key: sample_id
  layer_name: X
  train_test_split: data_splits/luad/luad2/train_test_split.json
  cv_splits: data_splits/luad/luad2/cv_splits.json
  dataset_name: luad2
  task_name: cancer_stage_classification
qc:
  min_genes: 10
  min_cells: 10
preprocessing:
  skip: true
  normalize: true
  target_sum: 10000
  apply_log1p: true
hvg:
  skip: true
  batch_key: batch
  n_top_genes: 4096
  flavor: seurat
embedding:
  load_cached: false
  method: scimilarity
  module: features.scimilarity_extractor
  class: SCimilarityExtractor
  viz: true
  eval: true
  params:
    model_path: /home/jupyter/mnt/MODELS/SCimilarity/model_v1.1
    use_gpu: true
evaluations:
- type: classification
  skip: false
  params:
    module: models.classify
    class: ClassifierPipeline
    model: randomforest
    n_estimators: 100
    max_depth: 5
    train_funcs:
    - avg
    - mil
    - vote
    cv: true
    cls_level: patient
    label_map:
      treatment_naive: 0
      TKI: 1
    viz: true
    eval: true
