run_id: null
dataset:
  module: data.data_loader
  class: H5ADLoader
  path: DATASETS/SCFM_datasets/EvalDatasets/cancer_benchmarking/BRCA_processed_T_cells_only.h5ad
  load_raw: False
  label_key: outcome
  batch_key: donor_id
  filter: 
    - column: outcome
      values:
        - NE
        - E
    - column: timepoint
      values:
        - Pre
  layer_name: X  #if data exist in another layer (e.g. adta.layers['counts']). The data will be copied to adata.X
  train_test_split: data_splits/brca_full/brca_outcome/train_test_split_oversampled.json #path is relative to BASE_PATH in setup_path.py
  cv_splits: data_splits/brca_full/brca_outcome/cv_splits_oversampled.json #path is relative to BASE_PATH in setup_path.py
  dataset_name: bassez_combined_preprocessed_prepared
  task_name: treatment_response
qc:
  min_genes: 10
  min_cells: 10
preprocessing:
  skip: false
  normalize: true
  target_sum: 10000
  apply_log1p: true
hvg:
  skip: false
  n_top_genes: 4096
  flavor: seurat
  batch_key: donor_id
embedding:
  method: scgpt
  module: extractors.scgpt.extract
  class: scGPTExtractor
  viz: true
  eval: true
  params:
    model_dir: ${VCC_CHECKPOINTS_BASE}/scGPT
    model_name: scGPT_human
    batch_size: 32
    n_bins: 51
    max_seq_len: 1200
    device: auto
    gene_name_col: null
evaluations:
- type: classification
  skip: False
  params:
    module: models.classify
    class: ClassifierPipeline
    model: randomforest
    n_estimators: 100
    max_depth: 5
    train_funcs: 
      - avg
      - mil
      - vote
    cv: True
    cls_level: patient
    label_map:
      NE: 0
      E: 1
    viz: True
    eval: True
