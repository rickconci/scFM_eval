run_id: null
dataset:
  module: data.depmap_loader
  class: DepMapLoader
  path: /lotterlab/datasets/VCC/DATASETS/SCFM_datasets/EvalDatasets/cancer_benchmarking/Depmap/Depmap_bulk_rna_drug_auc_subsampled10.h5ad
  load_raw: false
  cell_line_col: depmap_id
  drug_col: broad_id
  target_col: auc
  tissue_col: cell_line_OncotreeLineage
  moa_col: moa
  label_key: cell_line_OncotreeLineage
  batch_key: depmap_id
  layer_name: X
  train_test_split: null
  cv_splits: null
  dataset_name: depmap
  task_name: drug_response
  extract_unique_cell_lines: false
qc:
  skip: true
preprocessing:
  skip: false
  normalize: true
  target_sum: 10000
  apply_log1p: true
hvg:
  skip: true
embedding:
  method: stack_small_data
  module: extractors.stack.extract
  class: STACKExtractor
  viz: false
  eval: true
  params:
    checkpoint_path: /lotterlab/datasets/VCC/MODEL_CHECKPOINTS/SC_FM_repo_checkpoints/STACK/ablation/E0_baseline/last.ckpt
    genelist_path: /lotterlab/datasets/VCC/MODEL_CHECKPOINTS/SC_FM_repo_checkpoints/STACK/basecount_1000per_15000max.pkl
    batch_size: 32
    device: auto
    gene_name_col: null
evaluations:
- type: drug_response
  skip: false
  params:
    cell_line_col: depmap_id
    drug_col: broad_id
    target_col: auc
    tissue_col: cell_line_OncotreeLineage
    moa_col: moa
    split_types:
    - new_cell_line
    - new_drug
    - new_both
    test_size: 0.2
    random_state: 42
    model_type: both
    task_type: both
    classification_threshold: 0.9
    classification_target: zscore
    z_score_domain: per_lineage_drug
    z_sensitive_threshold: -1.0
    z_min_std: 1.0e-06
    mlp_epochs: 100
    mlp_patience: 10
    mlp_hidden_dims:
    - 256
    - 128
    - 64
    rf_n_estimators: 100
    use_drug_features: true
    smiles_col: smiles
    morgan_nbits: 1024
    morgan_radius: 2
