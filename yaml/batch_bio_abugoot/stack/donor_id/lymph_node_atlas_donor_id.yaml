dataset:
  batch_key: donor_id
  class: H5ADLoader
  cv_splits: null
  dataset_name: lymph_node_atlas
  label_key: cell_type
  layer_name: X
  load_raw: false
  module: data.data_loader
  path: lymph_node_atlas.h5ad
  task_name: batch_bio_integration
  train_test_split: null
embedding:
  class: STACKExtractor
  eval: true
  method: stack
  module: extractors.stack.extract
  params:
    batch_size: 32
    checkpoint_path: ${VCC_CHECKPOINTS_BASE}/STACK/bc_large_aligned.ckpt
    device: auto
    gene_name_col: null
    genelist_path: ${VCC_CHECKPOINTS_BASE}/STACK/basecount_1000per_15000max.pkl
  viz: true
evaluations:
- params:
    auto_subsample: true
    baseline_methods:
    - embed_cell_types
    - embed_cell_types_jittered
    batch_key: donor_id
    label_key: cell_type
    metric: euclidean
    n_neighbors: 90
    run_baselines: true
  skip: false
  type: batch_effects
- params:
    auto_subsample: true
    label_key: cell_type
    leiden_resolution: 0.3
    metric: euclidean
    n_neighbors: 15
  skip: false
  type: biological_signal
- params:
    k: 15
    label_key: cell_type
    method: sklearn_knn
    metric: euclidean
    min_cells_per_type: 2
    split_strategies:
    - round_robin
  skip: false
  type: annotation
hvg:
  batch_key: donor_id
  flavor: seurat
  n_top_genes: 4096
  skip: false
preprocessing:
  apply_log1p: true
  normalize: true
  skip: false
  target_sum: 10000
qc:
  min_cells: 10
  min_genes: 10
run_id: null
