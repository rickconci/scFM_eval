dataset:
  batch_key: batch_integration
  class: H5ADLoader
  cv_splits: null
  dataset_name: hypomap
  label_key: cell_type
  layer_name: X
  load_raw: false
  module: data.data_loader
  path: hypomap.h5ad
  task_name: batch_bio_integration
  train_test_split: null
embedding:
  class: GeneformerExtractor
  eval: true
  method: geneformer
  module: extractors.geneformer.extract
  params:
    batch_size: 32
    device: auto
    gene_name_col: null
    max_input_size: 2048
    model_dir: ${VCC_CHECKPOINTS_BASE}/Geneformer-V2-104M
    model_name: Geneformer-V2-104M
  viz: true
evaluations:
- params:
    auto_subsample: true
    baseline_methods:
    - embed_cell_types
    - embed_cell_types_jittered
    batch_key: batch_integration
    label_key: cell_type
    metric: euclidean
    n_neighbors: 90
    run_baselines: true
  skip: false
  type: batch_effects
- params:
    auto_subsample: true
    label_key: cell_type
    leiden_resolution: 0.3
    metric: euclidean
    n_neighbors: 15
  skip: false
  type: biological_signal
- params:
    k: 15
    label_key: cell_type
    method: sklearn_knn
    metric: euclidean
    min_cells_per_type: 2
    split_strategies:
    - round_robin
  skip: false
  type: annotation
hvg:
  batch_key: batch_integration
  flavor: seurat
  n_top_genes: 4096
  skip: false
preprocessing:
  apply_log1p: true
  normalize: true
  skip: false
  target_sum: 10000
qc:
  min_cells: 10
  min_genes: 10
run_id: null
